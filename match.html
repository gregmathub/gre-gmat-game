<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formula Match · FreeStudy Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600&family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{--navy:#0B1F3A;--navy-mid:#1A3558;--blue:#1D4ED8;--teal:#2DD4BF;--teal-d:#0D9488;--ink:#1E293B;--muted:#64748B;--line:#E2E8F0;--bg:#F1F5F9;--off:#F7F9FC;--amber:#D97706;--rose:#DB2777;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes flip{from{transform:rotateY(90deg);opacity:0}to{transform:rotateY(0);opacity:1}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0}20%{opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar{height:58px;background:var(--navy);border-bottom:3px solid var(--teal);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50;}
.brandrow{display:flex;align-items:center;gap:11px;}
.kick{font-weight:800;font-size:14px;letter-spacing:.5px;color:#fff;}
.kick-sub{font-size:9px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;}
.nav a,.nav button{font:inherit;font-size:13px;font-weight:600;color:#B9C9DE;background:none;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;text-decoration:none;}
.nav a:hover{color:#fff;background:rgba(255,255,255,.08);}
.so{border:1.5px solid rgba(255,255,255,.22)!important;color:#fff!important;}
.container{max-width:840px;margin:0 auto;padding:26px 22px 50px;}
.center{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--teal-d);border-radius:50%;animation:spin .7s linear infinite;}
.hidden{display:none!important;}
.card{background:#fff;border:1.5px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(11,31,58,.04);}
.btn{font:inherit;font-weight:700;border:none;border-radius:10px;cursor:pointer;}
.btn-p{background:linear-gradient(135deg,var(--amber),var(--rose));color:#fff;box-shadow:0 6px 18px rgba(217,119,6,.26);}
.btn-b{background:linear-gradient(135deg,var(--teal-d),var(--blue));color:#fff;box-shadow:0 6px 18px rgba(13,148,136,.26);}
.btn-s{background:var(--off);border:1.5px solid var(--line);color:var(--ink);}
.btn:disabled{opacity:.5;cursor:default;}
.lab{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
.serif{font-family:'Source Serif 4',serif;}
.field{margin-bottom:14px;}
.flab{font-size:12px;font-weight:700;color:#475569;margin-bottom:6px;display:block;}
.inp{width:100%;font:inherit;font-size:15px;padding:12px 14px;border:1.5px solid #CBD5E1;border-radius:10px;background:#fff;color:var(--ink);outline:none;}
.inp:focus{border-color:var(--blue);}
.seg{display:flex;background:var(--off);border:1.5px solid var(--line);border-radius:11px;padding:4px;gap:4px;}
.seg button{flex:1;font:inherit;font-size:13px;font-weight:600;padding:9px;border:none;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;}
.seg button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(11,31,58,.12);}
.toggle{width:46px;height:26px;border-radius:20px;border:none;cursor:pointer;position:relative;transition:.15s;}
.toggle .knob{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><g id="leaf"><circle cx="19" cy="6" r="5.5" fill="#2DD4BF"/><path d="M12,14 Q19,10 26,14 L24,23 L14,23 Z" fill="#2DD4BF"/><path d="M7,21 Q13,17 19,21 L19,32 Q13,30 7,32 Z" fill="#2DD4BF"/><path d="M19,21 Q25,17 31,21 L31,32 Q25,30 19,32 Z" fill="#2DD4BF"/></g></defs></svg>

<div class="topbar">
  <div class="brandrow">
    <svg viewBox="0 0 38 44" width="24" height="28"><use href="#leaf"/></svg>
    <div><div class="kick">FreeStudy Hub</div><div class="kick-sub">Formula Match</div></div>
  </div>
  <div class="nav"><a href="games.html">← All games</a><a href="leaderboard.html">Leaderboard</a><button class="so" onclick="SprintAuth.signOut().then(function(){location.href='index.html';})">Sign out</button></div>
</div>

<div id="loading" class="center"><div class="spinner"></div></div>
<div id="app" class="hidden"><div class="container" id="view"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="sprint-auth.js"></script>
<script src="sprint-game.js"></script>
<script src="invites.js"></script>
<script src="math-games.js"></script>
<script>
var GAMES=window.MATH_GAMES||[];
var LETTERS=["A","B","C","D","E"];
var PROF=null, myEk="", myName="You";
var CFG={mode:"cpu",topic:"mixed",penalty:true,rounds:10,p1:"You",p2:"Student"};
var M=null;            // match state
var roundTimer=null, unsub=null;
var ROUND_SECS=20;

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function initials(n){var p=String(n||"?").trim().split(/\s+/);return((p[0]||"")[0]||"")+((p[1]||"")[0]||"");}
function avColor(s){var h=0;s=String(s||"");for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);var c=["#0D9488","#1D4ED8","#7C3AED","#D97706","#DB2777","#0891B2"];return c[Math.abs(h)%c.length];}
// seeded RNG for online (both sides get same deck)
function seedRng(seed){var h=1779033703^seed.length;for(var i=0;i<seed.length;i++){h=Math.imul(h^seed.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return((h^=h>>>16)>>>0)/4294967296;};}
function seededShuffle(a,rng){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function pool(topic){
  var qs=[];
  GAMES.forEach(function(g){ if(topic!=="mixed"&&g.id!==topic)return;
    g.formulas.forEach(function(f){ f.questions.forEach(function(q){ qs.push({stem:q.stem,options:q.options,answer:q.answer,formula:f.formula,concept:f.concept}); }); });
  });
  return qs;
}

SprintAuth.gate().then(function(ctx){
  PROF=ctx.profile||{}; myEk=SprintGame.emailKey(PROF.email||ctx.user.email);
  myName=PROF.nickname||PROF.name||ctx.user.email; CFG.p1=myName;
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  // auto-accept an invite link:  match.html?join=ROOM&topic=..&rounds=..
  var qp=new URLSearchParams(location.search);
  if(qp.get("join")){
    CFG.mode="online"; CFG.topic=qp.get("topic")||"mixed"; CFG.rounds=+qp.get("rounds")||10;
    try{ SprintInvites.clear(myEk, qp.get("join").toUpperCase()); }catch(e){}
    startOnline(qp.get("join").toUpperCase());
    return;
  }
  watchInvites();
  renderSetup();
});

/* incoming challenge banner */
var inviteUnsub=null;
function watchInvites(){
  if(inviteUnsub)inviteUnsub();
  inviteUnsub=SprintInvites.watch(myEk,function(list){
    var bar=document.getElementById("inviteBar");
    if(!list.length){ if(bar)bar.remove(); return; }
    var inv=list[0];
    if(!bar){ bar=document.createElement("div"); bar.id="inviteBar"; document.body.appendChild(bar); }
    bar.style.cssText="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:100;background:var(--navy);border:1.5px solid var(--teal);border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,.3);padding:14px 18px;display:flex;align-items:center;gap:14px;max-width:92vw;animation:fade .3s ease;";
    bar.innerHTML='<div style="width:34px;height:34px;border-radius:10px;background:'+avColor(inv.fromName)+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;">'+esc(initials(inv.fromName))+'</div>'+
      '<div style="color:#fff;font-size:13.5px;"><b>'+esc(inv.fromName)+'</b> challenged you<div style="color:#8FA6C4;font-size:12px;">Formula Match · '+esc(inv.rounds)+' rounds</div></div>'+
      '<button class="btn btn-b" style="padding:9px 16px;font-size:13px;" onclick="acceptInvite(\''+inv.room+'\',\''+esc(inv.topic)+'\','+(+inv.rounds)+')">Accept</button>'+
      '<button class="btn btn-s" style="padding:9px 12px;font-size:13px;" onclick="dismissInvite(\''+inv.room+'\')">Later</button>';
  },4000);
}
function acceptInvite(room,topic,rounds){ CFG.mode="online"; CFG.topic=topic||"mixed"; CFG.rounds=rounds||10; try{SprintInvites.clear(myEk,room);}catch(e){} var b=document.getElementById("inviteBar"); if(b)b.remove(); startOnline(room); }
function dismissInvite(room){ try{SprintInvites.clear(myEk,room);}catch(e){} var b=document.getElementById("inviteBar"); if(b)b.remove(); }

/* ================= SETUP ================= */
function renderSetup(){
  stopSub(); clearInterval(roundTimer);
  var topicOpts='<option value="mixed">🎲 Mixed — all topics</option>'+GAMES.map(function(g){return '<option value="'+g.id+'">'+g.icon+' '+esc(g.name)+'</option>';}).join("");
  document.getElementById("view").innerHTML='<div style="max-width:560px;margin:0 auto;animation:fade .3s ease;">'+
    '<div style="text-align:center;margin-bottom:24px;"><div class="lab" style="color:var(--amber);">⚔️ Duel</div>'+
    '<h1 class="serif" style="font-size:34px;font-weight:600;color:var(--navy);margin:8px 0 4px;">Formula Match</h1>'+
    '<div style="color:var(--muted);font-size:14px;line-height:1.55;">Take turns asking. One player poses a formula question, the other must answer it. Miss it and — if penalties are on — your challenger scores.</div></div>'+
    '<div class="card" style="padding:22px;">'+
      '<div class="field"><label class="flab">Opponent</label>'+
        '<div class="seg" id="modeSeg">'+
          '<button class="on" data-m="cpu" onclick="setMode(\'cpu\')">🤖 Computer</button>'+
          '<button data-m="pass" onclick="setMode(\'pass\')">👥 Pass &amp; play</button>'+
          '<button data-m="online" onclick="setMode(\'online\')">🌐 Online</button>'+
        '</div></div>'+
      '<div id="modeExtra"></div>'+
      '<div class="field"><label class="flab">Topic</label><select class="inp" id="topicSel">'+topicOpts+'</select></div>'+
      '<div class="field"><label class="flab">Rounds</label>'+
        '<div class="seg" id="roundSeg">'+
          '<button data-r="6" onclick="setRounds(6)">6</button>'+
          '<button class="on" data-r="10" onclick="setRounds(10)">10</button>'+
          '<button data-r="14" onclick="setRounds(14)">14</button>'+
        '</div></div>'+
      '<div class="field" style="display:flex;align-items:center;justify-content:space-between;">'+
        '<div><label class="flab" style="margin-bottom:2px;">Penalty for a miss</label><div style="font-size:12px;color:var(--muted);">Wrong answer → challenger scores</div></div>'+
        '<button class="toggle" id="penTog" onclick="togglePen()"></button></div>'+
      '<button class="btn btn-p" id="startBtn" style="width:100%;padding:15px;font-size:16px;margin-top:8px;" onclick="beginMatch()">Start duel</button>'+
    '</div></div>';
  setMode(CFG.mode); setRounds(CFG.rounds); paintPen();
}
function setMode(m){CFG.mode=m;document.querySelectorAll("#modeSeg button").forEach(function(b){b.classList.toggle("on",b.dataset.m===m);});
  var ex=document.getElementById("modeExtra");
  if(m==="pass"){ex.innerHTML='<div class="field"><label class="flab">Player 1 (you)</label><input class="inp" id="p1" value="'+esc(CFG.p1)+'" maxlength="16"></div><div class="field"><label class="flab">Player 2</label><input class="inp" id="p2" value="'+esc(CFG.p2)+'" placeholder="e.g. your student" maxlength="16"></div>';}
  else if(m==="online"){ex.innerHTML='<div class="field"><div class="seg"><button class="on" id="obPick" onclick="setOnline(\'pick\')">Pick opponent</button><button id="obCreate" onclick="setOnline(\'create\')">Room code</button><button id="obJoin" onclick="setOnline(\'join\')">Join</button></div></div><div id="onlineBox"></div>';setOnline("pick");}
  else{ex.innerHTML='<div style="background:var(--off);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:14px;">🤖 The computer will answer when it\'s your turn to ask. Great for solo practice.</div>';}
}
var ONLINE="pick";
function setOnline(x){ONLINE=x;
  var b=document.getElementById("onlineBox");
  ["obPick","obCreate","obJoin"].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.toggle("on",id==="ob"+x.charAt(0).toUpperCase()+x.slice(1));});
  if(x==="create"){b.innerHTML='<div style="background:var(--off);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:14px;">A room code will be generated. Share it with your opponent so they can join and race the same deck.</div>';}
  else if(x==="join"){b.innerHTML='<div class="field"><label class="flab">Room code</label><input class="inp" id="joinCode" placeholder="e.g. K7P2QM" maxlength="6" style="text-transform:uppercase;letter-spacing:2px;font-weight:700;"></div>';}
  else{ renderRoster(); }
}
async function renderRoster(){
  var b=document.getElementById("onlineBox");
  b.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">Loading members…</div>';
  var roster=[], online={};
  try{
    roster = PROF.classCode ? await SprintGame.classLeaderboard(PROF.classCode,50) : await SprintGame.globalLeaderboard(50);
    var live = await SprintGame.roomPlayers("open"); var now=Date.now();
    live.concat(await SprintGame.roomPlayers("match_"+(CFG.lastRoom||"none"))).forEach(function(p){ if(now-(p.updatedAt||0)<120000) online[p.emailKey]=true; });
  }catch(e){}
  roster=roster.filter(function(p){return p.emailKey!==myEk;});
  if(!roster.length){ b.innerHTML='<div style="background:var(--off);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px;color:var(--muted);margin-bottom:14px;">No other members yet'+(PROF.classCode?" in your class":"")+'. Use “Room code” to create a room and share the code.</div>'; return; }
  b.innerHTML='<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Pick who to challenge'+(PROF.classCode?(' · class '+esc(PROF.classCode)):'')+'. They get an invite when they open the games.</div>'+
    '<div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">'+
    roster.map(function(p){
      var on=online[p.emailKey];
      return '<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;">'+
        '<div style="position:relative;"><div style="width:34px;height:34px;border-radius:10px;background:'+avColor(p.name)+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;">'+esc(initials(p.name))+'</div>'+(on?'<span style="position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:#10B981;border:2px solid #fff;"></span>':'')+'</div>'+
        '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(p.name)+'</div>'+
          '<div style="font-size:11.5px;color:'+(on?"#059669":"var(--muted)")+';font-weight:600;">'+(on?"● online now":"offline · will get invite")+'</div></div>'+
        '<button class="btn btn-p" style="padding:8px 16px;font-size:13px;" onclick="challenge(\''+p.emailKey+'\',\''+esc((p.name||"").replace(/'/g,""))+'\')">Challenge</button></div>';
    }).join("")+'</div>';
}
async function challenge(toEk,toName){
  CFG.topic=document.getElementById("topicSel").value;
  var room=code6(); CFG.lastRoom=room;
  try{ await SprintInvites.send({toEk:toEk,fromName:myName,fromEk:myEk,room:room,topic:CFG.topic,rounds:CFG.rounds}); }catch(e){}
  startOnline(room, toName);
}
function setRounds(r){CFG.rounds=r;document.querySelectorAll("#roundSeg button").forEach(function(b){b.classList.toggle("on",+b.dataset.r===r);});}
function togglePen(){CFG.penalty=!CFG.penalty;paintPen();}
function paintPen(){var t=document.getElementById("penTog");if(!t)return;t.style.background=CFG.penalty?"var(--teal-d)":"#CBD5E1";t.innerHTML='<span class="knob" style="left:'+(CFG.penalty?"23px":"3px")+';"></span>';}

/* ================= MATCH ENGINE ================= */
function beginMatch(){
  if(CFG.mode==="pass"){CFG.p1=(document.getElementById("p1").value.trim()||"Player 1");CFG.p2=(document.getElementById("p2").value.trim()||"Player 2");}
  CFG.topic=document.getElementById("topicSel").value;
  if(CFG.mode==="online"){return beginOnline();}
  var deck=shuffle(pool(CFG.topic)).slice(0,CFG.rounds);
  var names = CFG.mode==="cpu" ? [myName,"Computer"] : [CFG.p1,CFG.p2];
  M={mode:CFG.mode,deck:deck,rounds:deck.length,round:0,scores:[0,0],names:names,asker:0,phase:"reveal",selected:null,locked:false};
  renderRound();
}
// In each round: asker = M.asker, responder = 1-asker. Responder answers the card.
function renderRound(){
  clearInterval(roundTimer);
  var r=M.round, card=M.deck[r], asker=M.asker, resp=1-asker;
  var cpuResponding = (M.mode==="cpu" && resp===1);
  var passHuman = (M.mode==="pass");

  var header=
    '<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:16px;background:var(--navy);border:none;">'+
      scoreChip(0)+
      '<div style="text-align:center;"><div class="lab" style="color:#8FA6C4;">Round '+(r+1)+' / '+M.rounds+'</div>'+
        (CFG.penalty?'<div style="font-size:11px;color:#FBBF24;font-weight:700;margin-top:3px;">⚑ penalties on</div>':'<div style="font-size:11px;color:#8FA6C4;margin-top:3px;">no penalties</div>')+'</div>'+
      scoreChip(1)+
    '</div>';

  // ROLE banner
  var roleBanner='<div style="text-align:center;margin-bottom:14px;">'+
    '<span style="display:inline-block;background:#FEF3C7;color:#B45309;font-weight:700;font-size:13px;padding:6px 16px;border-radius:20px;">'+
      esc(M.names[asker])+' asks · '+esc(M.names[resp])+' answers</span></div>';

  var body;
  if(M.phase==="reveal"){
    // Asker reveals the card. For pass&play, show a "pass device to asker" gate first.
    body='<div class="card" style="padding:26px;text-align:center;animation:flip .3s ease;">'+
      '<div class="lab" style="color:var(--teal-d);margin-bottom:8px;">Formula card</div>'+
      '<div class="serif" style="font-size:22px;font-weight:600;color:var(--navy);margin-bottom:6px;">'+esc(card.formula)+'</div>'+
      '<div style="font-size:13px;color:var(--muted);margin-bottom:20px;">'+esc(card.concept)+'</div>'+
      '<button class="btn btn-p" style="padding:13px 28px;font-size:15px;" onclick="askCard()">'+
        (cpuResponding?'Ask the computer →':(passHuman?('Ask '+esc(M.names[resp])+' →'):'Pose question →'))+'</button></div>';
  } else {
    // question phase — responder answers
    body='<div class="card" style="padding:24px 26px;animation:fade .2s ease;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'+
        '<span style="font-size:11px;font-weight:600;color:var(--teal-d);background:#CCFBF1;padding:4px 11px;border-radius:20px;">'+esc(card.concept)+'</span>'+
        '<span id="rtimer" style="font-weight:800;font-size:18px;color:var(--navy);">'+ROUND_SECS+'</span></div>'+
      '<div class="serif" style="font-size:19px;line-height:1.6;color:var(--ink);margin-bottom:16px;">'+esc(card.stem)+'</div>'+
      '<div id="opts" style="display:flex;flex-direction:column;gap:9px;"></div>'+
      (cpuResponding?'<div id="cpuThinking" style="text-align:center;color:var(--muted);font-size:13px;margin-top:12px;">🤖 '+esc(M.names[1])+' is thinking…</div>':'')+
    '</div>';
  }
  document.getElementById("view").innerHTML='<div style="max-width:640px;margin:0 auto;">'+header+roleBanner+body+'</div>';

  if(M.phase==="question"){
    if(cpuResponding){ renderOpts(card,true); cpuAnswer(card); }
    else { renderOpts(card,false); startRoundTimer(card); }
  }
}
function scoreChip(i){
  var lead=M.scores[i]>M.scores[1-i];
  return '<div style="display:flex;align-items:center;gap:9px;">'+
    '<div style="width:34px;height:34px;border-radius:10px;background:'+avColor(M.names[i])+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;">'+esc(initials(M.names[i]))+'</div>'+
    '<div><div style="font-size:12px;color:#B9C9DE;font-weight:600;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(M.names[i])+'</div>'+
      '<div style="font-weight:800;font-size:18px;color:'+(lead?"#FBBF24":"#fff")+';">'+M.scores[i]+'</div></div></div>';
}
function askCard(){ M.phase="question"; M.selected=null; M.locked=false; renderRound(); }

function renderOpts(card,disabled){
  var box=document.getElementById("opts"); if(!box)return;
  box.innerHTML=card.options.map(function(text,i){
    var isSel=M.selected===i,border="var(--line)",bg="var(--off)",mkB="#CBD5E1",mkBg="#fff",mkC="var(--muted)",txt="var(--ink)",mk=LETTERS[i];
    if(M.locked){var corr=card.answer===i;
      if(corr){border="#6EE7B7";bg="#ECFDF5";mkB="#10B981";mkBg="#10B981";mkC="#fff";txt="#064E3B";mk="✓";}
      else if(isSel){border="#FCA5A5";bg="#FEF2F2";mkB="#EF4444";mkBg="#EF4444";mkC="#fff";txt="#7F1D1D";mk="✕";}
    } else if(isSel){border="#3B82F6";bg="#EFF6FF";mkB="var(--blue)";mkBg="var(--blue)";mkC="#fff";txt="#1D40AF";}
    var click=(disabled||M.locked)?"":'onclick="respond('+i+')"';
    return '<div '+click+' style="display:flex;align-items:center;gap:14px;padding:13px 16px;border:1.5px solid '+border+';border-radius:8px;cursor:'+((disabled||M.locked)?"default":"pointer")+';background:'+bg+';">'+
      '<div style="width:26px;height:26px;border:2px solid '+mkB+';border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:'+mkC+';background:'+mkBg+';">'+mk+'</div>'+
      '<div class="serif" style="flex:1;font-size:15.5px;line-height:1.45;color:'+txt+';">'+esc(text)+'</div></div>';
  }).join("");
}

function startRoundTimer(card){
  var left=ROUND_SECS;
  roundTimer=setInterval(function(){
    left--; var el=document.getElementById("rtimer");
    if(el){el.textContent=left;el.style.color=left<=5?"#DC2626":"var(--navy)";}
    if(left<=0){clearInterval(roundTimer); resolveRound(card,-1);}  // timeout = miss
  },1000);
}

function cpuAnswer(card){
  var delay=900+Math.random()*1400;
  // difficulty: computer correct ~62%
  var correct=Math.random()<0.62;
  var pick=correct?card.answer:( (card.answer+1+Math.floor(Math.random()*(card.options.length-1)))%card.options.length );
  setTimeout(function(){
    if(!M||M.phase!=="question")return;
    M.selected=pick; M.locked=true; renderOpts(card,true);
    var t=document.getElementById("cpuThinking"); if(t)t.style.display="none";
    setTimeout(function(){resolveRound(card,pick);},700);
  },delay);
}

function respond(i){
  if(M.locked)return;
  clearInterval(roundTimer);
  M.selected=i; M.locked=true; renderOpts(M.deck[M.round],false);
  setTimeout(function(){resolveRound(M.deck[M.round],i);},650);
}

function resolveRound(card,pick){
  clearInterval(roundTimer);
  var asker=M.asker, resp=1-asker;
  var correct = pick===card.answer;
  var gain=0, who=-1, msg="";
  if(correct){ gain=100; who=resp; M.scores[resp]+=100; msg=esc(M.names[resp])+" answered correctly · +100"; }
  else if(CFG.penalty){ gain=150; who=asker; M.scores[asker]+=150; msg=(pick===-1?"Time's up! ":"Missed! ")+esc(M.names[asker])+" scores the challenge · +150"; }
  else { msg=(pick===-1?"Time's up — ":"Missed — ")+"no points"; }
  // feedback banner then next
  var v=document.getElementById("view");
  var banner=document.createElement("div");
  banner.style.cssText="max-width:640px;margin:14px auto 0;text-align:center;animation:pop .3s ease;";
  banner.innerHTML='<div style="display:inline-block;background:'+(correct?"#ECFDF5":(CFG.penalty?"#FEF3C7":"#F1F5F9"))+';border:1.5px solid '+(correct?"#6EE7B7":(CFG.penalty?"#FCD34D":"var(--line)"))+';color:'+(correct?"#065F46":(CFG.penalty?"#92400E":"var(--muted)"))+';font-weight:700;font-size:14px;padding:10px 20px;border-radius:12px;">'+msg+'</div>';
  v.appendChild(banner);
  M.asker=resp; // swap roles each round
  M.round++;
  setTimeout(function(){
    if(M.round>=M.rounds){finishMatch();}
    else {M.phase="reveal";M.selected=null;M.locked=false;renderRound();window.scrollTo(0,0);}
  },1400);
}

function finishMatch(){
  clearInterval(roundTimer); stopSub();
  var a=M.scores[0],b=M.scores[1];
  // credit the logged-in account (player 1) with their match score on the shared leaderboard
  try{ SprintGame.bumpLeaderboard({email:PROF.email,name:myName,score:M.scores[0],classCode:PROF.classCode}); }catch(e){}
  var iAm = (M.mode==="cpu"||M.mode==="online")?0:-1; // in pass&play no single "me"
  var win = a===b?-1:(a>b?0:1);
  // record best for the human vs computer to global? keep matches local; only sprint feeds board.
  var confetti=(win>=0)?Array.from({length:22}).map(function(_,i){var cols=["#0D9488","#FBBF24","#1D4ED8","#7C3AED","#DB2777"];var l=Math.round(Math.random()*100),d=(2.4+Math.random()*1.6).toFixed(2),dl=(Math.random()*1).toFixed(2),sz=6+Math.round(Math.random()*6);return '<div style="position:absolute;top:0;left:'+l+'%;width:'+sz+'px;height:'+(sz+3)+'px;background:'+cols[i%cols.length]+';border-radius:2px;animation:floatUp 0s;"></div>';}).join(""):"";
  var title = win===-1?"It's a tie!":(esc(M.names[win])+" wins! 🏆");
  document.getElementById("view").innerHTML='<div style="max-width:560px;margin:0 auto;text-align:center;animation:fade .3s ease;">'+
    '<div class="lab" style="color:var(--amber);">Match over</div>'+
    '<h1 class="serif" style="font-size:34px;font-weight:600;color:var(--navy);margin:6px 0 20px;">'+title+'</h1>'+
    '<div style="display:flex;gap:14px;justify-content:center;margin-bottom:26px;">'+
      finalCard(0,win)+finalCard(1,win)+
    '</div>'+
    '<div style="display:flex;gap:12px;justify-content:center;">'+
      '<button class="btn btn-p" style="padding:13px 24px;font-size:15px;" onclick="beginMatch()">Rematch</button>'+
      '<button class="btn btn-s" style="padding:13px 24px;font-size:15px;" onclick="renderSetup()">Change setup</button>'+
      '<a class="btn btn-s" href="games.html" style="padding:13px 24px;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;">All games</a>'+
    '</div></div>';
}
function finalCard(i,win){
  var winner=win===i;
  return '<div class="card" style="padding:20px 26px;'+(winner?"border-color:#FCD34D;box-shadow:0 8px 24px rgba(217,119,6,.2);":"")+'">'+
    '<div style="width:48px;height:48px;border-radius:13px;margin:0 auto 10px;background:'+avColor(M.names[i])+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;">'+esc(initials(M.names[i]))+'</div>'+
    '<div style="font-weight:700;font-size:14px;color:var(--navy);margin-bottom:2px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(M.names[i])+'</div>'+
    '<div style="font-weight:800;font-size:30px;color:'+(winner?"#D97706":"var(--navy)")+';">'+M.scores[i]+'</div>'+
    (winner?'<div style="font-size:20px;margin-top:2px;">🏆</div>':'')+'</div>';
}

/* ================= ONLINE (race a friend, same seeded deck) ================= */
function code6(){var c="ABCDEFGHJKMNPQRSTUVWXYZ23456789",s="";for(var i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
async function beginOnline(){
  if(ONLINE==="pick"){ alert("Pick an opponent from the list to challenge them — or switch to “Room code”."); return; }
  var room;
  if(ONLINE==="join"){ room=(document.getElementById("joinCode").value.trim().toUpperCase()); if(room.length<4){alert("Enter the room code from your opponent.");return;} }
  else { room=code6(); }
  CFG.topic=document.getElementById("topicSel").value;
  startOnline(room);
}
async function startOnline(room, oppNameHint){
  if(inviteUnsub){inviteUnsub();inviteUnsub=null;}
  var roomId="match_"+room; CFG.lastRoom=room;
  await SprintGame.joinRoom(roomId,PROF);
  // seeded deck from room code + topic so both players get identical questions
  var rng=seedRng(room+"|"+CFG.topic);
  var deck=seededShuffle(pool(CFG.topic),rng).slice(0,CFG.rounds);
  M={mode:"online",room:room,roomId:roomId,deck:deck,rounds:deck.length,round:0,myScore:0,answered:0,oppName:oppNameHint||"Opponent",oppScore:0,oppAnswered:0,selected:null,locked:false,live:[]};
  stopSub();
  unsub=SprintGame.subscribeRoom(roomId,function(players){
    var opp=players.filter(function(p){return p.emailKey!==myEk;}).sort(function(a,b){return (b.score||0)-(a.score||0);})[0];
    if(opp){M.oppName=opp.name||M.oppName;M.oppScore=opp.score||0;M.oppAnswered=opp.answered||0;}
    if(M&&M.mode==="online"&&M.phase!=="done") paintOnlineHUD();
  },1200);
  renderOnlineRound();
}
function pushOnline(done){SprintGame.pushProgress(M.roomId,{name:myName,email:PROF.email,score:M.myScore,streak:0,answered:M.answered,done:!!done});}

function renderOnlineRound(){
  clearInterval(roundTimer);
  var card=M.deck[M.round];
  document.getElementById("view").innerHTML='<div style="max-width:640px;margin:0 auto;">'+
    '<div class="card" style="padding:12px 16px;margin-bottom:12px;background:var(--off);border-style:dashed;display:flex;align-items:center;justify-content:space-between;gap:10px;">'+
      '<div style="font-size:12px;color:var(--muted);">Room <b style="color:var(--navy);letter-spacing:1px;">'+esc(M.room)+'</b> · share to invite</div>'+
      '<div style="font-size:12px;color:var(--teal-d);font-weight:700;"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#10B981;animation:pulse 1.2s infinite;margin-right:5px;"></span>live</div></div>'+
    '<div class="card" id="onlineHud" style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;margin-bottom:16px;background:var(--navy);border:none;"></div>'+
    '<div class="card" style="padding:24px 26px;animation:fade .2s ease;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'+
        '<span style="font-size:11px;font-weight:600;color:var(--teal-d);background:#CCFBF1;padding:4px 11px;border-radius:20px;">'+esc(card.concept)+'</span>'+
        '<span style="font-size:12px;color:var(--muted);">Q '+(M.round+1)+' / '+M.rounds+'</span></div>'+
      '<div style="background:var(--off);border-left:3px solid var(--teal-d);border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:12px;"><span class="serif" style="font-size:15px;font-weight:600;color:var(--navy);">'+esc(card.formula)+'</span></div>'+
      '<div class="serif" style="font-size:19px;line-height:1.6;color:var(--ink);margin-bottom:16px;">'+esc(card.stem)+'</div>'+
      '<div id="opts" style="display:flex;flex-direction:column;gap:9px;"></div>'+
    '</div></div>';
  M.selected=null;M.locked=false;
  paintOnlineHUD();
  renderOnlineOpts(card);
}
function paintOnlineHUD(){
  var h=document.getElementById("onlineHud"); if(!h)return;
  var meLead=M.myScore>=M.oppScore;
  h.innerHTML=
    '<div style="display:flex;align-items:center;gap:9px;"><div style="width:32px;height:32px;border-radius:9px;background:'+avColor(myName)+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;">'+esc(initials(myName))+'</div>'+
      '<div><div style="font-size:12px;color:#B9C9DE;font-weight:600;">'+esc(myName)+' (you)</div><div style="font-weight:800;font-size:18px;color:'+(meLead?"#FBBF24":"#fff")+';">'+M.myScore+'</div></div></div>'+
    '<div style="text-align:center;color:#8FA6C4;font-weight:700;font-size:13px;">VS</div>'+
    '<div style="display:flex;align-items:center;gap:9px;flex-direction:row-reverse;"><div style="width:32px;height:32px;border-radius:9px;background:'+avColor(M.oppName)+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;">'+esc(initials(M.oppName))+'</div>'+
      '<div style="text-align:right;"><div style="font-size:12px;color:#B9C9DE;font-weight:600;">'+esc(M.oppName)+'</div><div style="font-weight:800;font-size:18px;color:'+(!meLead?"#FBBF24":"#fff")+';">'+M.oppScore+' <span style="font-size:11px;color:#8FA6C4;font-weight:600;">· '+M.oppAnswered+'/'+M.rounds+'</span></div></div></div>';
}
function renderOnlineOpts(card){
  var box=document.getElementById("opts"); if(!box)return;
  box.innerHTML=card.options.map(function(text,i){
    var isSel=M.selected===i,border="var(--line)",bg="var(--off)",mkB="#CBD5E1",mkBg="#fff",mkC="var(--muted)",txt="var(--ink)",mk=LETTERS[i];
    if(M.locked){var corr=card.answer===i;
      if(corr){border="#6EE7B7";bg="#ECFDF5";mkB="#10B981";mkBg="#10B981";mkC="#fff";txt="#064E3B";mk="✓";}
      else if(isSel){border="#FCA5A5";bg="#FEF2F2";mkB="#EF4444";mkBg="#EF4444";mkC="#fff";txt="#7F1D1D";mk="✕";}
    } else if(isSel){border="#3B82F6";bg="#EFF6FF";mkB="var(--blue)";mkBg="var(--blue)";mkC="#fff";txt="#1D40AF";}
    var click=M.locked?"":'onclick="onlineAnswer('+i+')"';
    return '<div '+click+' style="display:flex;align-items:center;gap:14px;padding:13px 16px;border:1.5px solid '+border+';border-radius:8px;cursor:'+(M.locked?"default":"pointer")+';background:'+bg+';">'+
      '<div style="width:26px;height:26px;border:2px solid '+mkB+';border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:'+mkC+';background:'+mkBg+';">'+mk+'</div>'+
      '<div class="serif" style="flex:1;font-size:15.5px;line-height:1.45;color:'+txt+';">'+esc(text)+'</div></div>';
  }).join("");
}
function onlineAnswer(i){
  if(M.locked)return;
  var card=M.deck[M.round];
  M.selected=i;M.locked=true;M.answered++;
  if(i===card.answer)M.myScore+=100;
  renderOnlineOpts(card); pushOnline(M.round+1>=M.rounds);
  setTimeout(function(){
    if(M.round+1>=M.rounds){finishOnline();}
    else{M.round++;renderOnlineRound();window.scrollTo(0,0);}
  },850);
}
function finishOnline(){
  M.phase="done"; pushOnline(true);
  try{ SprintGame.bumpLeaderboard({email:PROF.email,name:myName,score:M.myScore,classCode:PROF.classCode}); }catch(e){}
  var meWin=M.myScore>M.oppScore, tie=M.myScore===M.oppScore;
  document.getElementById("view").innerHTML='<div style="max-width:520px;margin:0 auto;text-align:center;animation:fade .3s ease;">'+
    '<div class="lab" style="color:var(--amber);">Match over</div>'+
    '<h1 class="serif" style="font-size:32px;font-weight:600;color:var(--navy);margin:6px 0 6px;">'+(tie?"It's a tie!":(meWin?"You win! 🏆":"You lost"))+'</h1>'+
    '<div style="color:var(--muted);font-size:14px;margin-bottom:22px;">'+esc(myName)+' '+M.myScore+' — '+M.oppScore+' '+esc(M.oppName)+(M.oppAnswered<M.rounds?'<br><span style="font-size:12px;">('+esc(M.oppName)+' still playing — final may change)</span>':'')+'</div>'+
    '<div style="display:flex;gap:12px;justify-content:center;">'+
      '<button class="btn btn-b" style="padding:13px 24px;font-size:15px;" onclick="renderSetup()">New match</button>'+
      '<a class="btn btn-s" href="games.html" style="padding:13px 24px;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;">All games</a>'+
    '</div></div>';
  stopSub();
}

function stopSub(){if(unsub){unsub();unsub=null;}}
window.addEventListener("beforeunload",function(){stopSub();if(M&&M.mode==="online")SprintGame.leaveRoom(M.roomId,PROF.email);});
window.setMode=setMode;window.setOnline=setOnline;window.setRounds=setRounds;window.togglePen=togglePen;window.beginMatch=beginMatch;window.askCard=askCard;window.respond=respond;window.onlineAnswer=onlineAnswer;window.renderSetup=renderSetup;window.challenge=challenge;window.acceptInvite=acceptInvite;window.dismissInvite=dismissInvite;
</script>
</body>
