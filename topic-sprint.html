<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Sprint · FreeStudy Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600&family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{--navy:#0B1F3A;--navy-mid:#1A3558;--blue:#1D4ED8;--teal:#2DD4BF;--teal-d:#0D9488;--ink:#1E293B;--muted:#64748B;--line:#E2E8F0;--bg:#F1F5F9;--off:#F7F9FC;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes floatUp{0%{transform:translateY(0);opacity:0}20%{opacity:1}100%{transform:translateY(-46px);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{height:58px;background:var(--navy);border-bottom:3px solid var(--teal);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50;}
.brandrow{display:flex;align-items:center;gap:11px;}
.kick{font-weight:800;font-size:14px;letter-spacing:.5px;color:#fff;}
.kick-sub{font-size:9px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;}
.nav a,.nav button{font:inherit;font-size:13px;font-weight:600;color:#B9C9DE;background:none;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;text-decoration:none;}
.nav a:hover{color:#fff;background:rgba(255,255,255,.08);}
.so{border:1.5px solid rgba(255,255,255,.22)!important;color:#fff!important;}
.container{max-width:1000px;margin:0 auto;padding:28px 22px 50px;}
.center{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--teal-d);border-radius:50%;animation:spin .7s linear infinite;}
.hidden{display:none!important;}
.card{background:#fff;border:1.5px solid var(--line);border-radius:16px;box-shadow:0 1px 2px rgba(11,31,58,.04);}
.btn{font:inherit;font-weight:700;border:none;border-radius:10px;cursor:pointer;}
.btn-p{background:linear-gradient(135deg,var(--teal-d),var(--blue));color:#fff;box-shadow:0 6px 18px rgba(13,148,136,.26);}
.btn-s{background:var(--off);border:1.5px solid var(--line);color:var(--ink);}
.lab{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
.serif{font-family:'Source Serif 4',serif;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
.tcard{cursor:pointer;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:20px;transition:.14s;}
.tcard:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 10px 26px rgba(11,31,58,.10);}
.ticon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#7C3AED,#1D4ED8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;}
.tname{font-family:'Source Serif 4',serif;font-weight:600;font-size:18px;color:var(--navy);margin-bottom:4px;}
.tmeta{font-size:12.5px;color:var(--muted);line-height:1.5;}
.tbest{font-size:11.5px;font-weight:700;color:var(--teal-d);margin-top:10px;}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><g id="leaf"><circle cx="19" cy="6" r="5.5" fill="#2DD4BF"/><path d="M12,14 Q19,10 26,14 L24,23 L14,23 Z" fill="#2DD4BF"/><path d="M7,21 Q13,17 19,21 L19,32 Q13,30 7,32 Z" fill="#2DD4BF"/><path d="M19,21 Q25,17 31,21 L31,32 Q25,30 19,32 Z" fill="#2DD4BF"/></g></defs></svg>

<div class="topbar">
  <div class="brandrow">
    <svg viewBox="0 0 38 44" width="24" height="28"><use href="#leaf"/></svg>
    <div><div class="kick">FreeStudy Hub</div><div class="kick-sub">Topic Sprint</div></div>
  </div>
  <div class="nav"><a href="games.html">← All games</a><a href="leaderboard.html">Leaderboard</a><button class="so" onclick="SprintAuth.signOut().then(function(){location.href='index.html';})">Sign out</button></div>
</div>

<div id="loading" class="center"><div class="spinner"></div></div>
<div id="app" class="hidden"><div class="container" id="view"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="sprint-auth.js"></script>
<script src="math-games.js"></script>
<script>
var GAMES=window.MATH_GAMES||[];
var LETTERS=["A","B","C","D","E"];
var PROF=null, myEk="";
var S=null, timer=null, advTimer=null;

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function bestKey(gid){return "topic_best_"+myEk+"_"+gid;}
function getBest(gid){try{return +localStorage.getItem(bestKey(gid))||0;}catch(e){return 0;}}
function setBest(gid,v){try{localStorage.setItem(bestKey(gid),String(v));}catch(e){}}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

SprintAuth.gate().then(function(ctx){
  PROF=ctx.profile||{}; myEk=(PROF.email||ctx.user.email||"").toLowerCase().replace(/[.#$\[\]]/g,"-");
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  renderPicker();
});

/* ---------- PICKER ---------- */
function renderPicker(){
  clearInterval(timer);
  var v=document.getElementById("view");
  v.innerHTML='<div style="animation:fade .3s ease;">'+
    '<div style="text-align:center;margin-bottom:26px;"><div class="lab" style="color:#7C3AED;">Practice mode</div>'+
    '<h1 class="serif" style="font-size:34px;font-weight:600;color:var(--navy);margin:8px 0 4px;">Pick a topic</h1>'+
    '<div style="color:var(--muted);font-size:15px;">Each sprint draws every question in the topic. Beat your personal best.</div></div>'+
    '<div class="grid">'+GAMES.map(function(g){
      var best=getBest(g.id), qn=g.formulas.reduce(function(a,f){return a+f.questions.length;},0);
      return '<div class="tcard" onclick="startTopic(\''+g.id+'\')">'+
        '<div class="ticon">'+g.icon+'</div>'+
        '<div class="tname">'+esc(g.name)+'</div>'+
        '<div class="tmeta">'+esc(g.blurb)+'</div>'+
        '<div class="tbest">'+qn+' questions'+(best?(' · best '+best):'')+'</div></div>';
    }).join("")+'</div></div>';
}

/* ---------- SPRINT ---------- */
function startTopic(gid){
  var g=GAMES.find(function(x){return x.id===gid;}); if(!g)return;
  var qs=[];
  g.formulas.forEach(function(f){ f.questions.forEach(function(q){ qs.push({stem:q.stem,options:q.options,answer:q.answer,formula:f.formula,concept:f.concept}); }); });
  qs=shuffle(qs);
  S={gid:gid,name:g.name,icon:g.icon,Q:qs,total:qs.length,index:0,score:0,streak:0,correct:0,selected:null,locked:false,hints:{},timeLeft:qs.length*20};
  clearInterval(timer);
  timer=setInterval(function(){
    if(!S)return; S.timeLeft--; var el=document.getElementById("clock");
    if(S.timeLeft<=0){clearInterval(timer);finish();return;}
    if(el){var m=Math.floor(S.timeLeft/60),s=S.timeLeft%60;el.textContent=m+":"+(s<10?"0":"")+s;el.style.color=S.timeLeft<20?"#DC2626":"#fff";}
  },1000);
  renderPlay();
}

function multForStreak(s){return Math.min(1+Math.max(0,s-1)*0.5,3);}
function fmtMult(m){return Number.isInteger(m)?String(m):m.toFixed(1);}

function renderPlay(){
  var q=S.Q[S.index];
  var m=Math.floor(S.timeLeft/60),s=S.timeLeft%60;
  document.getElementById("view").innerHTML=
    '<div style="max-width:720px;margin:0 auto;">'+
    '<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;margin-bottom:16px;background:var(--navy);border:none;">'+
      '<div style="min-width:130px;"><div class="lab" style="color:#8FA6C4;">'+S.icon+' '+esc(S.name)+'</div>'+
        '<div style="font-size:12px;color:#B9C9DE;margin-top:4px;">Q '+(S.index+1)+' / '+S.total+'</div></div>'+
      '<div style="text-align:center;position:relative;"><div id="scoreN" style="font-weight:800;font-size:30px;color:#fff;line-height:1;">'+S.score+'</div><div class="lab" style="color:#8FA6C4;">Points</div><div id="gain"></div></div>'+
      '<div style="text-align:right;min-width:110px;"><div id="clock" style="font-weight:800;font-size:22px;color:#fff;">'+m+':'+(s<10?"0":"")+s+'</div>'+
        '<div class="lab" style="color:#8FA6C4;">×'+fmtMult(multForStreak(Math.max(1,S.streak)))+' streak</div></div>'+
    '</div>'+
    '<div class="card" style="padding:24px 26px;">'+
      '<div style="margin-bottom:12px;"><span style="font-size:11px;font-weight:600;color:var(--teal-d);background:#CCFBF1;padding:4px 11px;border-radius:20px;">'+esc(q.concept)+'</span></div>'+
      '<div class="serif" style="font-size:19px;line-height:1.6;color:var(--ink);margin-bottom:14px;">'+esc(q.stem)+'</div>'+
      '<div id="hintSlot" style="margin-bottom:16px;"></div>'+
      '<div id="opts" style="display:flex;flex-direction:column;gap:9px;"></div>'+
    '</div></div>';
  renderHint(); renderOpts();
}

function renderHint(){
  var q=S.Q[S.index],slot=document.getElementById("hintSlot"); if(!slot)return;
  if(S.hints[S.index]){
    slot.innerHTML='<div style="background:var(--off);border:1px solid var(--line);border-left:3px solid var(--teal-d);border-radius:8px;padding:12px 16px;animation:pop .3s ease;"><div class="lab" style="color:var(--teal-d);margin-bottom:5px;">Formula</div><div class="serif" style="font-size:16px;font-weight:600;color:var(--navy);">'+esc(q.formula)+'</div></div>';
  } else {
    slot.innerHTML='<button '+(S.locked?"disabled":"")+' onclick="revealHint()" style="display:inline-flex;align-items:center;gap:8px;background:#F5F3FF;border:1px dashed #A78BFA;color:#6D28D9;font:inherit;font-weight:600;font-size:13px;padding:9px 15px;border-radius:9px;cursor:'+(S.locked?"not-allowed":"pointer")+';">🔒 Show formula <span style="background:#EDE9FE;padding:1px 8px;border-radius:6px;font-weight:700;">−40</span></button>';
  }
}
function revealHint(){ if(S.locked||S.hints[S.index])return; S.hints[S.index]=true; S.score=Math.max(0,S.score-40); document.getElementById("scoreN").textContent=S.score; renderHint(); }

function renderOpts(){
  var q=S.Q[S.index],box=document.getElementById("opts"); if(!box)return;
  box.innerHTML=q.options.map(function(text,i){
    var isSel=S.selected===i,border="var(--line)",bg="var(--off)",mkB="#CBD5E1",mkBg="#fff",mkC="var(--muted)",txt="var(--ink)",mk=LETTERS[i];
    if(S.locked){var corr=q.answer===i;
      if(corr){border="#6EE7B7";bg="#ECFDF5";mkB="#10B981";mkBg="#10B981";mkC="#fff";txt="#064E3B";mk="✓";}
      else if(isSel){border="#FCA5A5";bg="#FEF2F2";mkB="#EF4444";mkBg="#EF4444";mkC="#fff";txt="#7F1D1D";mk="✕";}
    } else if(isSel){border="#3B82F6";bg="#EFF6FF";mkB="var(--blue)";mkBg="var(--blue)";mkC="#fff";txt="#1D40AF";}
    return '<div onclick="answer('+i+')" style="display:flex;align-items:center;gap:14px;padding:13px 16px;border:1.5px solid '+border+';border-radius:8px;cursor:'+(S.locked?"default":"pointer")+';background:'+bg+';">'+
      '<div style="width:26px;height:26px;border:2px solid '+mkB+';border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:'+mkC+';background:'+mkBg+';">'+mk+'</div>'+
      '<div class="serif" style="flex:1;font-size:15.5px;line-height:1.45;color:'+txt+';">'+esc(text)+'</div></div>';
  }).join("");
}

function answer(i){
  if(S.locked)return;
  var q=S.Q[S.index],correct=i===q.answer;
  S.selected=i; S.locked=true;
  var gain=0;
  if(correct){S.streak++;gain=Math.round(100*multForStreak(S.streak));S.score+=gain;S.correct++;}
  else {S.streak=0;}
  document.getElementById("scoreN").textContent=S.score;
  var g=document.getElementById("gain");
  if(g)g.innerHTML='<div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-weight:800;font-size:17px;color:'+(correct?"#34D399":"#FB7185")+';animation:floatUp 1s ease forwards;">'+(correct?("+"+gain):"miss")+'</div>';
  renderHint(); renderOpts();
  clearTimeout(advTimer); advTimer=setTimeout(function(){ if(S.index<S.total-1){S.index++;S.selected=null;S.locked=false;renderPlay();window.scrollTo(0,0);}else finish(); },900);
}

function finish(){
  clearInterval(timer);
  var prevBest=getBest(S.gid), isPB=S.score>prevBest;
  if(isPB) setBest(S.gid,S.score);
  var pct=Math.round(S.correct/S.total*100);
  document.getElementById("view").innerHTML='<div style="max-width:560px;margin:0 auto;text-align:center;animation:fade .3s ease;">'+
    '<div class="lab" style="color:#7C3AED;">'+S.icon+' '+esc(S.name)+'</div>'+
    '<h1 class="serif" style="font-size:34px;font-weight:600;color:var(--navy);margin:6px 0 2px;">'+(isPB?"New personal best! 🎉":"Sprint complete")+'</h1>'+
    '<div style="color:var(--muted);font-size:14px;margin-bottom:22px;">'+(isPB?"":("Your best: "+prevBest))+'</div>'+
    '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:26px;flex-wrap:wrap;">'+
      '<div class="card" style="padding:18px 24px;"><div style="font-weight:800;font-size:34px;color:var(--navy);line-height:1;">'+S.score+'</div><div class="lab" style="margin-top:4px;">Points</div></div>'+
      '<div class="card" style="padding:18px 24px;"><div style="font-weight:800;font-size:34px;color:#059669;line-height:1;">'+S.correct+'<span style="font-size:18px;color:var(--muted);">/'+S.total+'</span></div><div class="lab" style="margin-top:4px;">Correct</div></div>'+
      '<div class="card" style="padding:18px 24px;"><div style="font-weight:800;font-size:34px;color:var(--navy);line-height:1;">'+pct+'%</div><div class="lab" style="margin-top:4px;">Accuracy</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:12px;justify-content:center;">'+
      '<button class="btn btn-p" style="padding:13px 24px;font-size:15px;" onclick="startTopic(\''+S.gid+'\')">Retry topic</button>'+
      '<button class="btn btn-s" style="padding:13px 24px;font-size:15px;" onclick="renderPicker()">Pick another</button>'+
    '</div></div>';
}
window.startTopic=startTopic;window.answer=answer;window.revealHint=revealHint;window.renderPicker=renderPicker;
</script>
</body>
</html>
